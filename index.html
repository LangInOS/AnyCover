<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AnyCover - 多平台封面生成器</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="styles.css?v=20260505-dual-template-picker">
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <div class="brand">
        <img src="assets/anycover-mark.svg" alt="" width="44" height="44">
        <div>
          <h1>AnyCover</h1>
          <p>输入观点 -> 选择平台与样式 -> 生成任意场景封面 PNG</p>
        </div>
      </div>
      <nav class="account-links" aria-label="作者链接">
        <a href="https://x.com/LangInOS" target="_blank" rel="noreferrer" aria-label="X @LangInOS">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 5l14 14M19 5 5 19"></path>
          </svg>
          <span>LangInOS</span>
        </a>
        <a href="https://github.com/LangInOS/AnyCover" target="_blank" rel="noreferrer" aria-label="GitHub 仓库">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2.8a9.2 9.2 0 0 0-2.9 17.9c.5.1.7-.2.7-.5v-1.8c-2.8.6-3.4-1.1-3.4-1.1-.5-1.1-1.1-1.4-1.1-1.4-.9-.6.1-.6.1-.6 1 0 1.6 1.1 1.6 1.1.9 1.6 2.4 1.1 2.9.8.1-.7.4-1.1.7-1.4-2.2-.2-4.6-1.1-4.6-4.8 0-1.1.4-1.9 1-2.6-.1-.3-.4-1.3.1-2.6 0 0 .8-.3 2.7 1a9.3 9.3 0 0 1 4.8 0c1.8-1.2 2.7-1 2.7-1 .5 1.3.2 2.3.1 2.6.6.7 1 1.5 1 2.6 0 3.7-2.3 4.6-4.6 4.8.4.3.7.9.7 1.8v2.7c0 .3.2.6.7.5A9.2 9.2 0 0 0 12 2.8Z"></path>
          </svg>
          <span>GitHub</span>
        </a>
      </nav>
    </header>

    <section class="layout">
      <div class="left-stack">
        <aside class="panel platform-panel">
          <div class="panel-title-row">
            <h2>平台</h2>
            <label class="multi-toggle compact-mode-toggle">
              <input id="multiPlatformToggle" type="checkbox" checked>
              <span class="switch-track" aria-hidden="true"><span></span></span>
              <span class="switch-label">多平台</span>
            </label>
          </div>
          <div class="field platform-field">
            <div class="field-label-row">
              <span>发布平台</span>
              <span id="platformModeHint" class="mode-hint">默认全选，可取消不需要的平台</span>
            </div>
            <div id="platformGrid" class="platform-grid"></div>
          </div>
        </aside>

        <aside class="panel copy-panel">
          <h2>文案</h2>
          <label>
            顶部标签
            <input id="tagInput" value="ANYCOVER">
          </label>
          <label>
            引导句
            <input id="leadInput" value="把一个观点做成">
          </label>
          <label>
            核心标题
            <textarea id="titleInput">能让人停下来的`封面`</textarea>
            <span class="hint">用反引号包裹高亮词，例如：我的`AI工作流`</span>
          </label>
          <div class="inline-actions">
            <button id="randomHighlightBtn" class="ghost" type="button">随机高亮</button>
            <button id="clearHighlightBtn" class="ghost" type="button">清除高亮</button>
          </div>
          <label>
            背景水印字
            <input id="watermarkInput" maxlength="4" placeholder="留空自动取高亮词">
          </label>
          <div class="inline-actions watermark-actions">
            <button id="randomWatermarkBtn" class="ghost" type="button">随机水印</button>
            <button id="clearWatermarkBtn" class="ghost" type="button">跟随高亮</button>
          </div>
          <label>
            署名
            <input id="signInput" value="AnyCover · creator · 2026">
          </label>
        </aside>
      </div>

      <aside class="panel style-panel">
        <h2>样式</h2>
        <div class="field template-field">
          <div class="field-label-row label-text">
            <span>版式模板</span>
          </div>
          <div id="templatePicker" class="template-picker">
            <button id="templatePickerButton" class="template-picker-button" type="button" aria-expanded="false" aria-controls="templatePickerMenu"></button>
            <div id="templatePickerMenu" class="template-picker-menu" hidden>
              <div class="template-column">
                <strong>横屏</strong>
                <div id="horizontalTemplateOptions"></div>
              </div>
              <div class="template-column">
                <strong>竖屏</strong>
                <div id="verticalTemplateOptions"></div>
              </div>
            </div>
          </div>
        </div>
        <label>
          标题字体
          <select id="titleFontSelect"></select>
        </label>
        <label>
          标题字号
          <input id="fontSizeInput" type="range" min="72" max="210" value="150">
        </label>
        <div class="field">
          <div class="field-label-row">
            <span>背景花纹</span>
            <button id="randomPatternBtn" class="tiny-random" type="button" title="随机花纹" aria-label="随机花纹">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="4" width="16" height="16" rx="3"></rect>
                <circle cx="9" cy="9" r="1.4"></circle>
                <circle cx="15" cy="9" r="1.4"></circle>
                <circle cx="12" cy="12" r="1.4"></circle>
                <circle cx="9" cy="15" r="1.4"></circle>
                <circle cx="15" cy="15" r="1.4"></circle>
              </svg>
            </button>
          </div>
          <select id="patternSelect"></select>
        </div>
        <label>
          花纹强度
          <input id="patternStrength" type="range" min="0" max="80" value="32">
        </label>
        <div>
          <div class="field-label-row label-text">
            <span>配色方案</span>
            <div class="label-actions">
              <button id="cyclePaletteBtn" class="tiny-random" type="button" title="换一组配色" aria-label="换一组配色">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7 7h9.5l-2-2"></path>
                  <path d="M17 17H7.5l2 2"></path>
                  <path d="M17 7l2-2 2 2"></path>
                  <path d="M7 17l-2 2-2-2"></path>
                </svg>
              </button>
              <button id="randomPaletteBtn" class="tiny-random" type="button" title="随机配色" aria-label="随机配色">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="4" y="4" width="16" height="16" rx="3"></rect>
                  <circle cx="9" cy="9" r="1.4"></circle>
                  <circle cx="15" cy="9" r="1.4"></circle>
                  <circle cx="12" cy="12" r="1.4"></circle>
                  <circle cx="9" cy="15" r="1.4"></circle>
                  <circle cx="15" cy="15" r="1.4"></circle>
                </svg>
              </button>
            </div>
          </div>
          <div id="paletteGrid" class="palette-grid"></div>
        </div>
        <button id="exportBtn" class="primary" type="button">导出选中 PNG</button>
        <button id="exportAllBtn" class="primary secondary-primary" type="button">导出所有 PNG</button>
        <div class="inline-actions">
          <button id="randomStyleBtn" class="ghost" type="button">随机样式</button>
          <button id="generateBatchBtn" class="ghost" type="button">换一组候选</button>
        </div>
      </aside>

      <section class="panel preview-panel">
        <div class="preview-head">
          <h2 id="previewTitle">多平台预览</h2>
          <div class="preview-tools">
            <label class="grid-toggle">
              <input id="previewGridToggle" type="checkbox">
              <span>背景网格</span>
            </label>
            <span id="previewMeta">X 封面 · 2500x1000</span>
          </div>
        </div>
        <div id="multiPreviewWall" class="multi-preview-wall"></div>
        <div id="singlePreview" class="single-preview canvas-stage">
          <canvas id="coverCanvas" width="2500" height="1000"></canvas>
        </div>
        <div class="batch-head">
          <span id="batchTitle">套装候选</span>
          <span id="batchMeta">当前平台候选预览，点击应用到主图</span>
        </div>
        <div id="variantGrid" class="variant-grid"></div>
      </section>
    </section>
  </main>

  <script src="app.js?v=20260505-dual-template-picker"></script>
</body>
</html>
